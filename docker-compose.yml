version: "3.9"

services:
  db:
    image: mysql:8.4
    container_name: biblio-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: biblio_universitaire
      MYSQL_USER: biblio
      MYSQL_PASSWORD: bibliopassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: biblio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/biblio_universitaire?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: biblio
      DB_PASSWORD: bibliopassword
      JWT_SECRET: Y2hhbmdlLW1lLXRoaXMtaXMtYS1zZWNyZXQta2V5LWZvci1qd3QtaG1hYy1zaGEyNTYtbXVzdC1iZS1sb25n
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173
      MAIL_ENABLED: "false"
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: biblio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Borrow Approved</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f6fb; padding:24px;">
<div style="max-width:560px; margin:auto; background:#fff; padding:28px; border-radius:12px;">
    <h2 style="color:#16a34a; margin-top:0;">Borrow approved</h2>
    <p>Hello <strong th:text="${user}">Student</strong>,</p>
    <p>You have borrowed <strong th:text="${book}">Book Title</strong>.</p>
    <p>Please return it by <strong th:text="${dueDate}">YYYY-MM-DD</strong>.</p>
    <hr style="border:none; border-top:1px solid #e5e7eb;">
    <p style="color:#6b7280; font-size:12px;">Bibliotheque Universitaire en Ligne</p>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reservation Created</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f6fb; padding:24px;">
<div style="max-width:560px; margin:auto; background:#fff; padding:28px; border-radius:12px;">
    <h2 style="color:#3b82f6; margin-top:0;">Reservation registered</h2>
    <p>Hello <strong th:text="${user}">Student</strong>,</p>
    <p>Your reservation for <strong th:text="${book}">Book Title</strong> has been registered and is pending librarian approval.</p>
    <p>You will receive an additional notification once the reservation status is updated.</p>
    <hr style="border:none; border-top:1px solid #e5e7eb;">
    <p style="color:#6b7280; font-size:12px;">Bibliotheque Universitaire en Ligne</p>
</div>
</body>
</html>
